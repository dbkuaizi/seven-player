main:
  push:
    - runner:
        cpus: 2
      services:
        - docker
        - git-clone-yyds
      stages:
        - name: sync to github
          image: tencentcom/git-sync
          imports: https://cnb.cool/dbkuaizi/safe-env/-/blob/main/git/github.yml
          settings:
            branch: main
            auth_type: https
            username: ${GIT_USERNAME}
            password: ${GIT_ACCESS_TOKEN}
            target_url: https://github.com/dbkuaizi/seven-player.git
            git_email: github-actions[bot]@users.noreply.github.com
