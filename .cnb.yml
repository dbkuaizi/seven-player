"**":
  web_trigger_build_macos_arm64:
    - name: Build macOS ARM64 with Wails3 Docker
      runner:
        tags: cnb:arch:amd64
        cpus: 8
      docker:
        build: build/docker/Dockerfile.cross
      env:
        OUTPUT_ZIP: dist/PanPlayer115-darwin-arm64.zip
      stages:
        - name: Build Wails3 macOS app
          script: sh .cnb/scripts/build-macos-arm64-wails3.sh
        - name: Upload build artifact
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/PanPlayer115-darwin-arm64.zip
              - dist/PanPlayer115-darwin-arm64.zip.sha256

"$":
  tag_push:
    - name: Release macOS ARM64 with Wails3 Docker
      runner:
        tags: cnb:arch:amd64
        cpus: 8
      docker:
        build: build/docker/Dockerfile.cross
      env:
        OUTPUT_ZIP: dist/PanPlayer115-darwin-arm64.zip
      stages:
        - name: Build Wails3 macOS app
          script: sh .cnb/scripts/build-macos-arm64-wails3.sh
        - name: Create release
          type: git:release
          options:
            title: "${CNB_BRANCH}"
            description: "PanPlayer 115 macOS ARM64 build for ${CNB_BRANCH}"
        - name: Upload release artifact
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - dist/PanPlayer115-darwin-arm64.zip
              - dist/PanPlayer115-darwin-arm64.zip.sha256
